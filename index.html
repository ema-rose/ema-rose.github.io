<!DOCTYPE html>
<html>
  <script src="./js/vue.js"></script>
  <head>
    <title>Resume</title>
    
    <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .header {
      background-color: #ffffff92;
      padding: 20px;
      text-align: center
    }

    .button {
      border: none;
      color: #ffffff92;
      text-align: center;
      font-size: 28px;
      margin: 8px 5px;
    }
    .button:hover {
      color: white;
      }
    
    .topnav {
      overflow: hidden;
      background-color: #74557182;
      padding: 14px 16px;
    }

    .topnav a {
      float: left;
      display: block;
      color: #f2f2f2;
      text-align: center;
    }
    
    .background {
      background-image: url("./files/CoverPhoto.png");
      background-color: #0000009c;
      height: 500px;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      position: relative;
    }

    .preview {
      background-color: #0000009c;
      width: 200px;
      min-height: 200px;
      max-height: auto;
      float: left;
      margin: 3px;
      padding: 3px;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      position: relative;
    }

    </style>
  </head>
  <body>
    <div id="app">

      </div>
      <div class="background">
        <div class="header">
          
          <p v-text="message"></p>
          <button class="button" @click="setMessage()">Profile</button>
      </div>
      </div>
    

    

      <div class="topnav">
        <!-- when clicked show component -->
        <button @click="setMessage(app.profile)">Profile</button>
        <button @click="setMessage(app.projects)">Projects</button>
        <button @click="setMessage(app.expirience)">Expirience</button>
        
      </div>

      <!-- <p style="background-color:#ff6347ba;" -->
      <p
      v-if="message == profile"
      v-html="profile"
      ></p>
      <p
      v-if="message == projects"
      v-html="projects"
      ></p>
      <p
      v-if="message == expirience"
      v-html="expirience"
      ></p>
      <p
      v-if="message == education"
      v-html="education"
      ></p>
      <p
      v-if="message == development"
      v-html="development"
      ></p>
      <p
      v-if="message == contact"
      v-html="contact"
      ></p>

    </div>

    <div id="app-2">
      <div class="preview">
        <p><img v-bind:src="resume"></p>
      </div>
    </div>

    <script>
      "use strict"

      var app = new Vue({
        el: '#app',
        data: {
          message:      "testing",
          profile:      "profile here",
          projects:     "projects here",
          expirience:   "expirience here",
          education:    "education here",
          development:  "development here",
          contact:      "erschroeder@knox.edu"
        },
        methods: {
          
          setMessage () {
            this.message = profile;
          }

           //message: preview(message),
           //profile: preview(this.profile)
        }
      });

      var app2 = new Vue({
        el: '#app-2',
        data: {
          resume:  './files/Resume.png'
        },
        
        methods: {
          // Create sections for each component and allow them to be set
          // in place of resume
          setContent: function() {
            this.resume = "./files/Resume.png"
          }
        }
      });

    </script>
  </body>
</html>
