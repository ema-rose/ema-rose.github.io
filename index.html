<!DOCTYPE html>
<html>
  <script src="./js/vue.js"></script>
  <head>
    <title>Resume</title>
    
    <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .header {
      background-color: #ffffff92;
      padding: 20px;
      text-align: center
    }
    
    .topnav {
      overflow: hidden;
      background-color: #74557182;
      padding: 14px 16px;
    }

    .topnav a {
      float: left;
      display: block;
      color: #f2f2f2;
      text-align: center;
    }
    
    .background {
      /*placeholder for eventual image*/
      /* background-image: url("./CoverPhoto.png"); */
      background-color: #c400005b;
      /* height: 500px; */
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      position: relative;
    }

    </style>
  </head>
  <body>
    <div class="header">
        <h1>Emily Schroeder<hr></h1>
    </div>
    <div class="background"></div>
    

    <div id="app">

      <div class="topnav">
        <!-- when clicked show component -->
        <button v-html="profile" @click="setMessage(app.profile)">Profile</button>

        
      </div>

      <!-- <p style="background-color:#ff6347ba;" -->
      <p
      v-if="message == profile"
      v-html="profile"
      ></p>
      <p
      v-if="message == projects"
      v-html="projects"
      ></p>
      <p
      v-if="message == expirience"
      v-html="expirience"
      ></p>
      <p
      v-if="message == education"
      v-html="education"
      ></p>
      <p
      v-if="message == development"
      v-html="development"
      ></p>
      <p
      v-if="message == contact"
      v-html="contact"
      ></p>

    </div>
    <script>
      "use strict"

      var app = new Vue({
        el: '#app',
        data: {
          message:      "",
          profile:      "profile here",
          projects:     "projects here",
          expirience:   "expirience here",
          education:    "education here",
          development:  "development here",
          contact:      "erschroeder@knox.edu"
        },
        methods: {
          
          setMessage (element) {
            this.message = element;
          }

           //message: preview(message),
           //profile: preview(this.profile)
        }
      });

    </script>
  </body>
</html>
